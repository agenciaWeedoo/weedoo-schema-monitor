name: Weekly Schema Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Segunda-feira às 09:00 UTC (06:00 BRT)
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  check-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 extruct jsonschema PyGithub lxml

      - name: Run Schema Monitor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python src/monitor.py
