name: 🔍 Monitoramento Semanal de Schema Markup — Weedoo

on:
  schedule:
    - cron: '0 9 * * 1'  # Toda segunda-feira às 09:00 UTC = 06:00 BRT
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Ativar modo de debug verboso'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write
  issues: write

jobs:
  schema-monitor:
    name: Auditoria de Schema Markup
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install \
            requests==2.31.0 \
            beautifulsoup4==4.12.3 \
            "lxml==4.9.4" \
            extruct==0.16.0 \
            w3lib==2.1.2 \
            PyGithub==2.3.0

      - name: 📁 Garantir diretório /reports
        run: mkdir -p reports

      - name: 🤖 Executar monitoramento de Schema Markup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: "1"
          DEBUG_MODE: ${{ inputs.debug_mode || 'false' }}
          # Opcional: adicione ANTHROPIC_API_KEY como secret no repositório para
          # ativar geração de FAQs por IA (mais relevantes para cada artigo).
          # Sem ela, as FAQs são geradas por heurísticas baseadas nos headings.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "=== Iniciando WeedooSEOMonitorBot ==="
          echo "Repositório : $GITHUB_REPOSITORY"
          echo "Data/Hora   : $(date +'%Y-%m-%d %H:%M:%S %Z')"
          echo "Python      : $(python --version)"
          echo "FAQ com IA  : $([ -n '${{ secrets.ANTHROPIC_API_KEY }}' ] && echo 'Ativado' || echo 'Desativado (heurísticas)')"
          python src/monitor.py

      - name: 💾 Commit e push do relatório gerado
        run: |
          git config user.name  "WeedooSEOBot"
          git config user.email "bot@weedoo.med.br"
          git add reports/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança para commitar."
          else
            git commit -m "📊 Schema Report — $(date +'%Y-%m-%d') [bot]"
            git push
            echo "✅ Relatório commitado e enviado."
          fi

      - name: 🚨 Notificar falha (se houver erro no workflow)
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Falha no Monitoramento de Schema — ' + new Date().toLocaleDateString('pt-BR'),
              body: `Workflow falhou.\n\n**Run:** ${context.runId}\n**Link:** https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['schema-report', 'bug']
            });
